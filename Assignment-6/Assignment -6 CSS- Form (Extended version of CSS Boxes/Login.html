<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
     <nav class="navbar">
  <div class="avatar">
    <img src="./Assets/Profile pic.png" alt="User Avatar">
  </div>
  <ul class="nav-links">
    <li><a href="./index.html">Home</a></li>
    <li><a href="./about-us.html">About</a></li>
    <li><a href="./contact-us.html">Contact</a></li>
    <li><a href="./careers.html">Careers</a></li>
    <li><a href="./login.html">Login</a></li>

  </ul>
  <div class="Logo">
    <img src="./Assets/Logo.png.png" alt="website logo">
  </div>
</nav>
<div class="login-container">
    <form action="#" method="post" class="login-form">
          <h2>Login </h2>
        <label for="username">Username:</label>
        <div class="username-field">
        <input class="user-name"  type="text" id="username" name="username" required placeholder="Username">
        <img src="./Assets/user.png" alt="">
        </div>
        <div class="email-field">
        <label for="email">Email:</label>
        <input class="email" type="email" id="email" name="email" required placeholder="Email">
        <img src="./Assets/gmail.png" alt="">
        </div>
        <div class="password-field">
        <label for="password">Password:</label>
        <input class="password" type="password" id="password" name="password" required placeholder="Password">
        <img src="./Assets/padlock.png" alt="">
        </div>

        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
